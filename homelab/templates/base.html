<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Listener</title>
<script src="/static/htmx.min.js"></script>
<style>
  :root{color-scheme:dark}
  body{font-family:system-ui,-apple-system,sans-serif;margin:0;background:#0f1115;color:#e6e6e6}
  header{background:#161a22;padding:12px 20px;border-bottom:1px solid #262b36;position:sticky;top:0}
  header a{color:#8ab4f8;text-decoration:none;margin-right:18px;font-weight:600}
  main{max-width:920px;margin:22px auto;padding:0 16px}
  .card{background:#161a22;border:1px solid #262b36;border-radius:10px;padding:16px;margin-bottom:14px}
  h1{margin:.1em 0 .4em} h2{margin:.1em 0 .5em;font-size:1.1em}
  a{color:#8ab4f8} .muted{color:#8b93a1;font-size:.9em}
  .seg{padding:7px 0;border-bottom:1px solid #20242e}
  .seg:last-child{border-bottom:none}
  .who{display:inline-block;min-width:120px;color:#9ece6a;font-weight:600}
  .pill{background:#20242e;border-radius:20px;padding:2px 10px;font-size:.8em;margin-right:6px}
  input,select,button{background:#0f1115;color:#e6e6e6;border:1px solid #2a2f3a;border-radius:6px;padding:7px 11px;font-size:1em}
  button{cursor:pointer;background:#2a3140}
  table{width:100%;border-collapse:collapse}
  td,th{text-align:left;padding:7px 8px;border-bottom:1px solid #20242e}
  audio{height:26px;vertical-align:middle}
</style>
</head>
<body>
<header>
  <a href="/">🎧 Listener</a>
  <a href="/speakers">Speakers</a>
  <a href="/unknown">Unknown</a>
</header>
<main>{% block body %}{% endblock %}</main>
</body>
</html>
