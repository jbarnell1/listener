<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{% block title %}Listener{% endblock %}</title>
<script src="/static/htmx.min.js"></script>
<style>
:root{
  --bg:#0a0c10; --bg2:#0f131a; --card:#141a25; --card2:#1a2230; --border:#232e3e;
  --text:#e9eef6; --muted:#8a96a8; --accent:#7c9cff; --accent2:#b07cff;
  --good:#5ad19a; --warn:#ffcf6e; color-scheme:dark;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:radial-gradient(1100px 760px at 72% -12%,#16223e 0%,var(--bg) 56%) fixed;
  color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.55}
a{color:var(--accent);text-decoration:none}
.wrap{max-width:840px;margin:0 auto;padding:0 16px}
header.nav{position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);
  background:rgba(10,12,16,.7);border-bottom:1px solid var(--border)}
.nav .wrap{display:flex;align-items:center;gap:4px;height:58px}
.brand{font-weight:800;font-size:1.16rem;letter-spacing:-.02em;margin-right:auto;
  background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;
  background-clip:text;color:transparent}
.tab{color:var(--muted);padding:8px 13px;border-radius:11px;font-weight:600;font-size:.92rem}
.tab:hover{color:var(--text);background:var(--card)}
.tab.active{color:var(--text);background:var(--card2)}
main{padding:22px 0 64px;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
h1.page{font-size:1.62rem;letter-spacing:-.025em;margin:4px 0 2px}
.sub{color:var(--muted);margin:0 0 18px}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--border);
  border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 18px 40px -28px #000}
.card h2{font-size:1.02rem;letter-spacing:-.01em;margin:0 0 12px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:15px 10px;text-align:center}
.stat .n{font-size:1.55rem;font-weight:800;letter-spacing:-.03em}
.stat .l{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.av{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;
  font-weight:800;font-size:.86rem;color:#0a0c10;letter-spacing:-.02em;
  background:linear-gradient(140deg,hsl(var(--hue,212) 78% 72%),hsl(var(--hue,212) 72% 56%));
  box-shadow:inset 0 0 0 1px #0007,0 8px 18px -10px hsl(var(--hue,212) 75% 55%)}
.av.lg{width:58px;height:58px;font-size:1.2rem}
.grow{flex:1;min-width:0}
.name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.muted{color:var(--muted);font-size:.86rem}
.chevron{color:var(--muted);font-size:1.3rem;line-height:1}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;font-weight:700;
  padding:3px 9px;border-radius:999px;border:1px solid var(--border);color:var(--muted)}
.chip.good{color:var(--good);border-color:#2c4d3e;background:#122019}
.chip.unk{color:var(--warn);border-color:#4c4329;background:#1f1b11}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0c10;font-weight:800;
  border:none;border-radius:12px;padding:10px 16px;cursor:pointer;font-size:.92rem}
.btn:hover{filter:brightness(1.07)}
.btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--border);font-weight:700}
input,select{background:var(--bg2);color:var(--text);border:1px solid var(--border);
  border-radius:12px;padding:10px 13px;font-size:.95rem;width:100%}
.field{display:flex;gap:8px;flex-wrap:wrap}
.field .grow,.field input,.field select{flex:1;min-width:140px}
.field .btn{flex:none}
.msg{display:flex;gap:12px;margin:16px 0}
.msg .bubble{background:#11161f;border:1px solid var(--border);border-radius:16px;
  border-top-left-radius:5px;padding:11px 15px;flex:1;min-width:0}
.msg .who{font-weight:800;font-size:.88rem;color:hsl(var(--hue,212) 72% 74%)}
.msg .t{color:var(--muted);font-size:.72rem;margin-right:6px;font-variant-numeric:tabular-nums}
.msg .line{margin:4px 0}
audio{height:32px;width:190px;max-width:48vw;filter:saturate(.6)}
.empty{text-align:center;color:var(--muted);padding:26px 0}
.tier{font-size:.64rem;font-weight:800;letter-spacing:.05em;padding:3px 8px;border-radius:7px;flex:none}
.tier.soon{color:#0a0c10;background:linear-gradient(135deg,#ffcf6e,#ff9e5e)}
.tier.later{color:var(--muted);background:var(--card2);border:1px solid var(--border)}
.due{color:var(--accent);font-weight:700;font-size:.8rem;font-variant-numeric:tabular-nums}
.quote{color:var(--muted);font-size:.84rem;font-style:italic;margin-top:2px}
.x{color:var(--muted);background:none;border:none;cursor:pointer;font-size:1.2rem;padding:2px 8px;flex:none}
.x:hover{color:var(--text)}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}h1.page{font-size:1.42rem}}
</style>
</head>
<body>
<header class="nav"><div class="wrap">
  <a href="/" class="brand">🎧 Listener</a>
  <a href="/" class="tab {{ 'active' if active=='home' }}">Home</a>
  <a href="/tasks" class="tab {{ 'active' if active=='tasks' }}">Tasks</a>
  <a href="/speakers" class="tab {{ 'active' if active=='speakers' }}">Speakers</a>
  <a href="/unknown" class="tab {{ 'active' if active=='unknown' }}">Unknown</a>
</div></header>
<main><div class="wrap">{% block body %}{% endblock %}</div></main>
</body>
</html>
