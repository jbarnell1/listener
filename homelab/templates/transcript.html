{% extends "base.html" %}
{% block body %}
<h1 class="page">Transcript #{{ t.id }}</h1>
<p class="sub">{{ t.audio_path }} · {{ t.created_at }}</p>

<div class="card">
  {% for b in blocks %}
    <div class="msg" style="--hue:{{ b.sid|hue }}">
      <div class="av">{{ b.who|initials }}</div>
      <div class="bubble">
        <div><a class="who" href="/speakers/{{ b.sid }}">{{ b.who }}</a></div>
        {% for ln in b.lines %}
          <div class="line"><span class="t">{{ '%.1f'|format(ln.t) }}s</span>{{ ln.text }}</div>
        {% endfor %}
      </div>
    </div>
  {% else %}<div class="empty">No segments</div>{% endfor %}
</div>
{% endblock %}
